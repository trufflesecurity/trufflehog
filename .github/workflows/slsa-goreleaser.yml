# ══════════════════════════════════════════════════════════
# 🔧 SLSA GoReleaser Configuration
# ══════════════════════════════════════════════════════════

version: 1

# ═══════════════════════════════════════════════════════
# Environment Variables
# ═══════════════════════════════════════════════════════
env:
  - GO111MODULE=on
  - CGO_ENABLED=0

# ═══════════════════════════════════════════════════════
# Build Flags
# ═══════════════════════════════════════════════════════
flags:
  - -trimpath
  - -mod=readonly

# ═══════════════════════════════════════════════════════
# Linker Flags (ldflags)
# ═══════════════════════════════════════════════════════
ldflags:
  - -s
  - -w
  - -X main.version={{.Version}}
  - -X main.commit={{.Commit}}
  - -X main.date={{.Date}}
  - -X main.builtBy=slsa-github-generator
  - -extldflags '-static'

# ═══════════════════════════════════════════════════════
# Build Targets (Multi-Platform)
# ═══════════════════════════════════════════════════════
goos:
  - linux
  - windows
  - darwin
  - freebsd

goarch:
  - amd64
  - arm64
  - arm
  - 386

goarm:
  - 6
  - 7

# ═══════════════════════════════════════════════════════
# Binary Name Template
# ═══════════════════════════════════════════════════════
binary: '{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}'

# ═══════════════════════════════════════════════════════
# Main Package Path
# ═══════════════════════════════════════════════════════
main: ./cmd/main.go

# ═══════════════════════════════════════════════════════
# Ignore Certain Combinations
# ═══════════════════════════════════════════════════════
ignore:
  - goos: darwin
    goarch: 386
  - goos: windows
    goarch: arm
  - goos: windows
    goarch: arm64
