# 🔥 Ultimate GitHub Actions Workflow - Professional Edition
# ══════════════════════════════════════════════════════════
# ✅ SLSA3 Compliance - Supply Chain Security
# ✅ TruffleHog - Secret Scanning
# ✅ Go Build & Release - Automated
# ✅ Security Scanning - Multi-layer
# ✅ Code Quality - Best Practices
# ══════════════════════════════════════════════════════════

name: 🚀 Ultimate CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  release:
    types: [created, published]
  workflow_dispatch:
  schedule:
    # تشغيل تلقائي كل يوم الساعة 2 صباحاً
    - cron: '0 2 * * *'

# الصلاحيات الأساسية
permissions:
  contents: write
  issues: write
  pull-requests: write
  security-events: write
  actions: read
  id-token: write

# متغيرات عامة
env:
  GO_VERSION: '1.21'
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ═══════════════════════════════════════════════════════
  # 1️⃣ Secret Scanning with TruffleHog
  # ═══════════════════════════════════════════════════════
  secret-scanning:
    name: 🔐 Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # جلب كل التاريخ لفحص شامل
      
      - name: 🔍 TruffleHog OSS Secret Scanner
        uses: trufflesecurity/trufflehog@v3.93.7
        with:
          # فحص كل الكود
          path: ./
          # فحص التاريخ الكامل
          base: ""
          head: HEAD
          # رفع النتائج كـ artifacts
          extra_args: --debug --only-verified

      - name: 📊 Upload TruffleHog Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-results
          path: |
            **/trufflehog-*.json
            **/secrets-*.txt

  # ═══════════════════════════════════════════════════════
  # 2️⃣ Code Quality & Linting
  # ═══════════════════════════════════════════════════════
  code-quality:
    name: ✨ Code Quality Check
    runs-on: ubuntu-latest
    needs: secret-scanning
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      
      - name: 📦 Install Dependencies
        run: |
          go mod download
          go mod verify
      
      - name: 🔍 Go Vet
        run: go vet ./...
      
      - name: 🎯 Staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
          install-go: false
      
      - name: 🔎 golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m
      
      - name: 🧪 Run Tests
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
      
      - name: 📊 Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          flags: unittests
          name: codecov-umbrella

  # ═══════════════════════════════════════════════════════
  # 3️⃣ Security Scanning (Multiple Tools)
  # ═══════════════════════════════════════════════════════
  security-scan:
    name: 🛡️ Security Scanning
    runs-on: ubuntu-latest
    needs: code-quality
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🔍 Run Trivy Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: 📤 Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: 🔐 Dependency Review
        uses: actions/dependency-review-action@v4
        if: github.event_name == 'pull_request'
      
      - name: 🛡️ Snyk Security Scan
        uses: snyk/actions/golang@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
      
      - name: 🔍 OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'github-project'
          path: '.'
          format: 'ALL'
      
      - name: 📊 Upload OWASP Results
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: ${{ github.workspace }}/reports

  # ═══════════════════════════════════════════════════════
  # 4️⃣ SLSA3 Compliant Build
  # ═══════════════════════════════════════════════════════
  slsa-build:
    name: 🏗️ SLSA3 Build & Release
    needs: [secret-scanning, code-quality, security-scan]
    permissions:
      id-token: write
      contents: write
      actions: read
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/builder_go_slsa3.yml@v2.0.0
    with:
      go-version: '1.21'
      config-file: .slsa-goreleaser.yml
      evaluated-envs: "VERSION:v1.0.0,COMMIT:${{github.sha}}"
      compile-builder: true
    secrets:
      registry-username: ${{ github.actor }}
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════
  # 5️⃣ Container Build & Scan
  # ═══════════════════════════════════════════════════════
  container-build:
    name: 🐳 Container Build & Push
    runs-on: ubuntu-latest
    needs: slsa-build
    if: github.event_name == 'release'
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 📝 Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest
      
      - name: 🏗️ Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
      
      - name: 🔍 Scan Container Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:latest
          format: 'sarif'
          output: 'container-scan.sarif'
      
      - name: 📤 Upload Container Scan Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'container-scan.sarif'

  # ═══════════════════════════════════════════════════════
  # 6️⃣ SBOM Generation (Software Bill of Materials)
  # ═══════════════════════════════════════════════════════
  sbom-generation:
    name: 📋 SBOM Generation
    runs-on: ubuntu-latest
    needs: slsa-build
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 📦 Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
      
      - name: 📤 Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
      
      - name: 📝 Attach SBOM to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: sbom.spdx.json

  # ═══════════════════════════════════════════════════════
  # 7️⃣ License Compliance Check
  # ═══════════════════════════════════════════════════════
  license-check:
    name: ⚖️ License Compliance
    runs-on: ubuntu-latest
    needs: code-quality
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: 📋 Check Licenses
        uses: google/go-licenses@latest
        with:
          mode: check
          args: ./...

  # ═══════════════════════════════════════════════════════
  # 8️⃣ Performance Testing
  # ═══════════════════════════════════════════════════════
  performance-test:
    name: ⚡ Performance Testing
    runs-on: ubuntu-latest
    needs: code-quality
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: 🏃 Run Benchmarks
        run: |
          go test -bench=. -benchmem -run=^$ ./... | tee benchmark.txt
      
      - name: 📊 Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark.txt

  # ═══════════════════════════════════════════════════════
  # 9️⃣ Documentation Generation
  # ═══════════════════════════════════════════════════════
  documentation:
    name: 📚 Generate Documentation
    runs-on: ubuntu-latest
    needs: code-quality
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: 📖 Generate Go Docs
        run: |
          go install golang.org/x/tools/cmd/godoc@latest
          godoc -http=:6060 &
          sleep 3
          wget -r -np -N -E -p -k http://localhost:6060/pkg/ -P docs/
      
      - name: 📤 Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs

  # ═══════════════════════════════════════════════════════
  # 🔟 Notifications & Reporting
  # ═══════════════════════════════════════════════════════
  notifications:
    name: 📢 Send Notifications
    runs-on: ubuntu-latest
    needs: [slsa-build, container-build, security-scan]
    if: always()
    
    steps:
      - name: 📊 Create Summary Report
        run: |
          echo "# 🚀 Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ Completed Jobs" >> $GITHUB_STEP_SUMMARY
          echo "- Secret Scanning: ${{ needs.secret-scanning.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Code Quality: ${{ needs.code-quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scan: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- SLSA Build: ${{ needs.slsa-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Container Build: ${{ needs.container-build.result }}" >> $GITHUB_STEP_SUMMARY
      
      - name: 📧 Send Slack Notification
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Pipeline ${{ job.status }}: ${{ github.repository }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Pipeline Status:* ${{ job.status }}\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  # ═══════════════════════════════════════════════════════
  # 1️⃣1️⃣ Cleanup Old Artifacts
  # ═══════════════════════════════════════════════════════
  cleanup:
    name: 🧹 Cleanup Old Artifacts
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
      - name: 🗑️ Delete Old Artifacts
        uses: c-hive/gha-remove-artifacts@v1
        with:
          age: '30 days'
          skip-recent: 5
