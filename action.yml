name: 'TruffleHog OSS by asrar-mared'
description: 'Find and verify leaked credentials in your source code — maintained by asrar-mared (Bug Hunter).'
author: asrar-mared <support@asrar-mared.com>

inputs:
  path:
    description: Repository path
    required: false
    default: "./"
  base:
    description: Start scanning from here (usually main branch).
    required: false
    default: ""
  head:
    description: Scan commits until here (usually dev branch).
    required: false
  extra_args:
    default: ""
    description: Extra args to be passed to the trufflehog cli.
    required: false
  version:
    default: "latest"
    description: Scan with this trufflehog cli version.
    required: false

branding:
  icon: "shield"
  color: "green"

runs:
  using: "composite"
  steps:
    - shell: bash
      working-directory: ${{ inputs.path }}
      env:
        BASE: ${{ inputs.base }}
        HEAD: ${{ inputs.head }}
        ARGS: ${{ inputs.extra_args }}
        COMMIT_IDS: ${{ toJson(github.event.commits.*.id) }}
        VERSION: ${{ inputs.version }}
      run: |
        echo "🔍 Starting TruffleHog scan — powered by asrar-mared (Bug Hunter)"

        if ! command -v jq &> /dev/null
        then
          echo "jq not found — installing..."
          apt-get -y update && apt-get install -y jq
        fi

        git status >/dev/null

        if [ -n "$BASE" ] || [ -n "$HEAD" ]; then
          if [ -n "$BASE" ]; then
            base_commit=$(git rev-parse "$BASE" 2>/dev/null) || true
          else
            base_commit=""
          fi
          if [ -n "$HEAD" ]; then
            head_commit=$(git rev-parse "$HEAD" 2>/dev/null) || true
          else
            head_commit=""
          fi
          if [ "$base_commit" == "$head_commit" ] ; then
            echo "::error::BASE and HEAD are identical — nothing to scan."
            exit 1
          fi
        else
          if [ "${{ github.event_name }}" == "push" ]; then
            COMMIT_LENGTH=$(printenv COMMIT_IDS | jq length)
            if [ $COMMIT_LENGTH == "0" ]; then
              echo "No commits to scan"
              exit 0
            fi
            HEAD=${{ github.event.after }}
            if [ ${{ github.event.before }} == "0000000000000000000000000000000000000000" ]; then
              BASE=""
            else
              BASE=${{ github.event.before }}
            fi
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "${{ github.event_name }}" == "schedule" ]; then
            BASE=""
            HEAD=""
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE=${{github.event.pull_request.base.sha}}
            HEAD=${{github.event.pull_request.head.sha}}
          fi
        fi

        docker run --rm -v .:/tmp -w /tmp \
        ghcr.io/trufflesecurity/trufflehog:${VERSION} \
        git file:///tmp/ \
        --since-commit ${BASE:-''} \
        --branch ${HEAD:-''} \
        --fail \
        --no-update \
        --github-actions \
        ${ARGS:-''}

        echo "✅ Scan completed successfully — signed by asrar-mared (Bug Hunter)"
